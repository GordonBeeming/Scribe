name: Scribe
options:
  bundleIdPrefix: com.gordonbeeming
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: 89DBN36T4T

targets:
  Scribe:
    type: application
    platform: iOS
    sources:
      - Scribe
    resources:
      - path: Scribe/PrivacyInfo.xcprivacy
    info:
      path: Scribe/Info.plist
      properties:
        UIBackgroundModes:
          - remote-notification
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gordonbeeming.scribe
        CODE_SIGN_ENTITLEMENTS: Scribe/Scribe.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: ScribeWidgetExtension
        embed: true

  ScribeWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ScribeWidget
      - path: Scribe/Utilities
        group: Shared/Utilities
      - path: Scribe/Models
        group: Shared/Models
    info:
      path: ScribeWidget/Info.plist
      properties:
        CFBundleDisplayName: Scribe Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gordonbeeming.scribe.widget
        CODE_SIGN_ENTITLEMENTS: ScribeWidget/ScribeWidget.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"

  ScribeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ScribeTests
    dependencies:
      - target: Scribe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gordonbeeming.scribe.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Scribe.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Scribe"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Scribe:
    build:
      targets:
        Scribe: all
        ScribeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ScribeTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
